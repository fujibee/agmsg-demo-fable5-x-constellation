<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="960" viewBox="0 0 1200 960" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D8DEE9"/>
    </marker>
    <marker id="arCoral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E8865A"/>
    </marker>
  </defs>

  <rect width="1200" height="960" fill="#0B1020"/>
  <g fill="#FFFFFF" opacity="0.35">
    <circle cx="90" cy="60" r="1.2"/><circle cx="300" cy="35" r="0.9"/><circle cx="520" cy="70" r="1.1"/>
    <circle cx="760" cy="40" r="0.8"/><circle cx="980" cy="65" r="1.2"/><circle cx="1130" cy="30" r="0.9"/>
    <circle cx="180" cy="920" r="1.0"/><circle cx="480" cy="935" r="0.8"/><circle cx="900" cy="925" r="1.1"/>
    <circle cx="1120" cy="905" r="0.9"/><circle cx="60" cy="500" r="0.8"/><circle cx="1150" cy="420" r="0.9"/>
  </g>

  <text x="600" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">One human instruction — how AI Constellation got built</text>
  <text x="600" y="80" text-anchor="middle" font-size="14" fill="#8FA3C8">Four agents coordinating on their own inside the agmsg desktop app (2026-07-03, unedited)</text>

  <g font-size="17" font-weight="700" text-anchor="middle">
    <rect x="60"  y="104" width="140" height="34" rx="17" fill="#2A3552"/><text x="130" y="127" fill="#FFFFFF">Human</text>
    <rect x="300" y="104" width="140" height="34" rx="17" fill="#E8865A"/><text x="370" y="127" fill="#1B0F08">Fable 5</text>
    <rect x="550" y="104" width="130" height="34" rx="17" fill="#4E9CFF"/><text x="615" y="127" fill="#081222">Grok</text>
    <rect x="790" y="104" width="140" height="34" rx="17" fill="#F2C14E"/><text x="860" y="127" fill="#221805">Opus 4.8</text>
    <rect x="1020" y="104" width="130" height="34" rx="17" fill="#5CD6B9"/><text x="1085" y="127" fill="#062019">Codex</text>
  </g>
  <g font-size="12" text-anchor="middle" fill="#8FA3C8">
    <text x="370" y="156">design, delegation, final review</text>
    <text x="615" y="156">live data from X</text>
    <text x="860" y="156">main implementation</text>
    <text x="1085" y="156">polish</text>
  </g>

  <g stroke="#2A3552" stroke-dasharray="4 6" stroke-width="1.5">
    <line x1="130" y1="166" x2="130" y2="880"/>
    <line x1="370" y1="166" x2="370" y2="880"/>
    <line x1="615" y1="166" x2="615" y2="880"/>
    <line x1="860" y1="166" x2="860" y2="880"/>
    <line x1="1085" y1="166" x2="1085" y2="880"/>
  </g>

  <!-- 1 instruction -->
  <line x1="130" y1="200" x2="362" y2="200" stroke="#D8DEE9" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="140" y="190" font-size="14" fill="#FFFFFF" font-weight="700">1. The instruction (the only human input)</text>
  <text x="140" y="218" font-size="12.5" fill="#B8C4DC">"3D constellation map of what X says about AI models. You only do the design."</text>

  <!-- 2 design doc -->
  <rect x="290" y="238" width="230" height="44" rx="8" fill="#1A2440" stroke="#E8865A" stroke-width="1.5"/>
  <text x="405" y="256" text-anchor="middle" font-size="13.5" fill="#FFD9C4" font-weight="700">2. Design doc (21,283 chars)</text>
  <text x="405" y="274" text-anchor="middle" font-size="12" fill="#B8C4DC">implementation-ready, §1–10</text>

  <!-- 3 fan-out -->
  <g stroke="#E8865A" stroke-width="2">
    <line x1="370" y1="308" x2="607" y2="308" marker-end="url(#arCoral)"/>
    <line x1="370" y1="336" x2="852" y2="336" marker-end="url(#arCoral)"/>
    <line x1="370" y1="364" x2="1077" y2="364" marker-end="url(#arCoral)"/>
  </g>
  <text x="382" y="300" font-size="13" fill="#FFD9C4" font-weight="700">3. Three tasks delegated at once</text>
  <text x="440" y="326" font-size="12" fill="#B8C4DC">to Grok: collect X topics (JSON schema contract)</text>
  <text x="560" y="356" font-size="12" fill="#B8C4DC">to Opus: main implementation (definition of done)</text>
  <text x="760" y="384" font-size="12" fill="#B8C4DC">to Codex: polish (priority list)</text>

  <!-- 4 data + rejection loop -->
  <rect x="530" y="404" width="170" height="42" rx="8" fill="#12203A" stroke="#4E9CFF" stroke-width="1.5"/>
  <text x="615" y="421" text-anchor="middle" font-size="13" fill="#BBD8FF" font-weight="700">4. data.json</text>
  <text x="615" y="438" text-anchor="middle" font-size="11.5" fill="#B8C4DC">25 topics, 53 real posts</text>
  <line x1="607" y1="466" x2="378" y2="466" stroke="#4E9CFF" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="370" y1="494" x2="607" y2="494" stroke="#E8865A" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arCoral)"/>
  <text x="392" y="487" font-size="12" fill="#FFB199" font-weight="700">inspected, sent back: "not enough posts"</text>
  <line x1="607" y1="522" x2="378" y2="522" stroke="#4E9CFF" stroke-width="2" marker-end="url(#ar)"/>
  <text x="392" y="540" font-size="12" fill="#B8C4DC">fixed, re-checked, approved ✓</text>

  <!-- 5 implementation -->
  <rect x="770" y="556" width="180" height="42" rx="8" fill="#221C0E" stroke="#F2C14E" stroke-width="1.5"/>
  <text x="860" y="573" text-anchor="middle" font-size="13" fill="#FFE9AE" font-weight="700">5. index.html built</text>
  <text x="860" y="590" text-anchor="middle" font-size="11.5" fill="#B8C4DC">single file, verified in-browser</text>
  <line x1="868" y1="618" x2="1077" y2="618" stroke="#F2C14E" stroke-width="2" marker-end="url(#ar)"/>
  <text x="888" y="611" font-size="12" fill="#B8C4DC">over to you for polish</text>

  <!-- 6 polish -->
  <rect x="995" y="638" width="180" height="42" rx="8" fill="#0E241E" stroke="#5CD6B9" stroke-width="1.5"/>
  <text x="1085" y="655" text-anchor="middle" font-size="13" fill="#B8F0DF" font-weight="700">6. Polish pass</text>
  <text x="1085" y="672" text-anchor="middle" font-size="11.5" fill="#B8C4DC">bloom, starfield, motion, mobile</text>
  <line x1="1077" y1="700" x2="378" y2="700" stroke="#5CD6B9" stroke-width="2" marker-end="url(#ar)"/>
  <text x="700" y="693" font-size="12" fill="#B8C4DC">done, ready for review</text>

  <!-- 7 review loop -->
  <rect x="250" y="720" width="330" height="46" rx="8" fill="#1A2440" stroke="#E8865A" stroke-width="1.8"/>
  <text x="415" y="738" text-anchor="middle" font-size="13.5" fill="#FFD9C4" font-weight="700">7. Visual review (measured actual pixels)</text>
  <text x="415" y="757" text-anchor="middle" font-size="12" fill="#B8C4DC">caught a shader color-space bug, sent 6 fixes</text>
  <line x1="370" y1="786" x2="1077" y2="786" stroke="#E8865A" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arCoral)"/>
  <line x1="1077" y1="812" x2="378" y2="812" stroke="#5CD6B9" stroke-width="2" marker-end="url(#ar)"/>
  <text x="640" y="779" font-size="12" fill="#FFB199" font-weight="700">fix instructions</text>
  <text x="640" y="830" font-size="12" fill="#B8C4DC">all fixed, re-measured, approved ✓</text>

  <!-- 8 delivery -->
  <line x1="362" y1="862" x2="138" y2="862" stroke="#D8DEE9" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="150" y="853" font-size="14" fill="#FFFFFF" font-weight="700">8. Delivered (121 fps)</text>

  <rect x="150" y="896" width="900" height="40" rx="10" fill="#131C33"/>
  <text x="600" y="921" text-anchor="middle" font-size="13.5" fill="#D8DEE9">The human typed message 1. Everything from 2 to 8 was agents talking to each other over agmsg.</text>
</svg>
