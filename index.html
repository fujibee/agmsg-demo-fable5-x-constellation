function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function lerpV3(a, b, t, out) {
  out.x = a.x + (b.x - a.x) * t;
  out.y = a.y + (b.y - a.y) * t;
  out.z = a.z + (b.z - a.z) * t;
  return out;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function mapLinear(x, a1, a2, b1, b2) { return b1 + (b2 - b1) * (x - a1) / (a2 - a1); }
function fmt(n) { return n.toLocaleString('en-US'); }
function fmtK(n) {
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
  return String(n);
}
function spherical(r, latDeg, lonDeg) {
  const lat = latDeg * Math.PI / 180, lon = lonDeg * Math.PI / 180;
  return new THREE.Vector3(
    r * Math.cos(lat) * Math.cos(lon),
    r * Math.sin(lat),
    r * Math.cos(lat) * Math.sin(lon)
  );
}

function createStarTexture() {
  const s = 256, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d'), cx = s / 2, cy = s / 2, R = s / 2;
  const grad = g.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0.00, 'rgba(255,255,255,1)');
  grad.addColorStop(0.08, 'rgba(255,255,255,0.98)');
  grad.addColorStop(0.30, 'rgba(255,255,255,0.55)');
  // exponential-ish falloff to transparent
  for (let i = 1; i <= 8; i++) {
    const t = 0.30 + (0.70 * i / 8);
    const a = Math.pow(1 - (i / 8), 2.5) * 0.55;
    grad.addColorStop(Math.min(t, 1), `rgba(255,255,255,${a.toFixed(3)})`);
  }
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  // 4 diffraction spikes (H + V)
  const len = R * 0.9;
  g.save(); g.translate(cx, cy); g.globalCompositeOperation = 'lighter';
  for (let k = 0; k < 2; k++) {
    g.rotate(Math.PI / 2 * k);
    const lg = g.createLinearGradient(0, 0, len, 0);
    lg.addColorStop(0, 'rgba(255,255,255,0.35)');
    lg.addColorStop(1, 'rgba(255,255,255,0)');
    g.strokeStyle = lg; g.lineWidth = 2;
    g.beginPath(); g.moveTo(0, 0); g.lineTo(len, 0); g.stroke();
    g.beginPath(); g.moveTo(0, 0); g.lineTo(-len, 0); g.stroke();
  }
  g.restore();
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}
function createHaloTexture() {
  const s = 256, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d'), cx = s / 2, cy = s / 2, R = s / 2;
  const grad = g.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)');
  for (let i = 1; i <= 10; i++) {
    const t = i / 10, a = Math.pow(1 - t, 3.5) * 0.9;
    grad.addColorStop(t, `rgba(255,255,255,${a.toFixed(3)})`);
  }
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}
function createRingTexture() {
  const s = 256, c = document.createElement('canvas'); c.width = c.height = s;
  const g = c.getContext('2d'), cx = s / 2, cy = s / 2;
  g.strokeStyle = 'rgba(255,255,255,1)'; g.lineWidth = 5;
  g.beginPath(); g.arc(cx, cy, s / 2 - 12, 0, Math.PI * 2); g.stroke();
  // small tick marks
  g.lineWidth = 3;
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + Math.PI / 4;
    const r1 = s / 2 - 24, r2 = s / 2 - 4;
    g.beginPath();
    g.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    g.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    g.stroke();
  }
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}
function createLabelTexture(name, vendor, color) {
  const w = 512, h = 128, c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.textAlign = 'center';
  g.font = '700 44px Inter, "Helvetica Neue", system-ui, sans-serif';
  g.fillStyle = '#ffffff';
  g.fillText(name, w / 2, 54);
  g.font = '400 22px Inter, "Helvetica Neue", system-ui, sans-serif';
  g.fillStyle = 'rgba(255,255,255,0.55)';
  g.fillText(vendor.toUpperCase(), w / 2, 86);
  // underline bar in model color, width of name text
  g.font = '700 44px Inter, "Helvetica Neue", system-ui, sans-serif';
  const tw = g.measureText(name).width;
  g.fillStyle = color;
  g.fillRect(w / 2 - tw / 2, 100, tw, 4);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}

let lastInteraction = -1e9;
let curAutoRotateSpeed = 0.35;
const TARGET_AUTOROTATE = 0.35;
let panelOpen = false;
let camTween = null;

const canvas = document.getElementById('scene');
const tipEl = document.getElementById('tip');
const hintEl = document.getElementById('hint');
const panelEl = document.getElementById('panel');

// ============================================================
// layout
// ============================================================
function layoutClusters(models) {
  const R = 150, map = new Map();
  // place by MODEL_ORDER around the ring; assign to models by id
  MODEL_ORDER.forEach((id, i) => {
    const lon = i * 72 + 20;
    const lat = (i % 2 === 0) ? 18 : -22;
    map.set(id, { center: spherical(R, lat, lon) });
  });
  return map;
}

function layoutTopics(model, center) {
  const topics = model.topics.slice().sort((a, b) => b.volume - a.volume);
  const n = topics.length;
  // global volume range for log size mapping
  const placed = [];
  const seed = fnv1a(model.id);
  const rnd = mulberry32(seed);
  for (let rank = 0; rank < n; rank++) {
    const topic = topics[rank];
    const w = 1 - rank / Math.max(1, n - 1);       // 1 biggest .. 0 smallest
    const rTarget = 8 + Math.pow(1 - w, 0.75) * 34;
    const scale = volumeToScale(topic.volume);
    let pos = null;
    for (let attempt = 0; attempt < 40; attempt++) {
      // seeded random unit vector, flattened into an ellipsoid
      let dir = new THREE.Vector3(rnd() * 2 - 1, (rnd() * 2 - 1), rnd() * 2 - 1);
      if (dir.lengthSq() < 1e-4) dir.set(1, 0, 0);
      dir.normalize();
      dir.y *= 0.55;
      dir.normalize();
      const jitter = rTarget * (0.85 + rnd() * 0.3);
      const cand = center.clone().add(dir.multiplyScalar(jitter));
      let ok = true;
      for (const p of placed) {
        const minD = (p.scale + scale) * 0.9 + 6;
        if (cand.distanceTo(p.pos) < minD) { ok = false; break; }
      }
      if (ok || attempt === 39) { pos = cand; break; }
    }
    placed.push({ topic, pos, scale });
  }
  return placed;
}

let VMIN = 1, VMAX = 1;
function computeVolumeRange() {
  let mn = Infinity, mx = -Infinity;
  for (const m of DATA.models) for (const t of m.topics) { mn = Math.min(mn, t.volume); mx = Math.max(mx, t.volume); }
  VMIN = mn; VMAX = mx;
}
function volumeToScale(v) {
  const lo = Math.log(VMIN), hi = Math.log(VMAX);
  const t = hi > lo ? (Math.log(v) - lo) / (hi - lo) : 0.5;
  return 7 + t * 17;   // 7 .. 24
}

// Prim's MST over an array of Vector3 -> list of [i,j] edges
function computeMST(points) {
  const n = points.length;
  if (n < 2) return [];
  const inTree = new Array(n).fill(false);
  const dist = new Array(n).fill(Infinity);
  const parent = new Array(n).fill(-1);
  dist[0] = 0;
  const edges = [];
  for (let it = 0; it < n; it++) {
    let u = -1, best = Infinity;
    for (let i = 0; i < n; i++) if (!inTree[i] && dist[i] < best) { best = dist[i]; u = i; }
    if (u === -1) break;
    inTree[u] = true;
    if (parent[u] !== -1) edges.push([parent[u], u]);
    for (let v = 0; v < n; v++) {
      if (!inTree[v]) {
        const d = points[u].distanceToSquared(points[v]);
        if (d < dist[v]) { dist[v] = d; parent[v] = u; }
      }
    }
  }
  return edges;
}

// ============================================================
// scene build
// ============================================================
function initRenderer() {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05070D, 1);

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x05070D, 500, 1100);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
  camera.position.copy(defaultCameraPosition());
  camera.lookAt(0, 0, 0);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.rotateSpeed = 0.55;
  controls.zoomSpeed = 0.9;
  controls.minDistance = window.innerWidth <= 640 ? 180 : 120;
  controls.maxDistance = window.innerWidth <= 640 ? 760 : 620;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = TARGET_AUTOROTATE;

  raycaster = new THREE.Raycaster();

  composer = new EffectComposer(renderer);
  composer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  composer.setSize(window.innerWidth, window.innerHeight);
  composer.addPass(new RenderPass(scene, camera));
  bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.55, 0.6, 0.72);
  composer.addPass(bloomPass);

  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  controls.minDistance = window.innerWidth <= 640 ? 180 : 120;
  controls.maxDistance = window.innerWidth <= 640 ? 760 : 620;
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  composer.setSize(window.innerWidth, window.innerHeight);
  if (bloomPass) bloomPass.setSize(window.innerWidth, window.innerHeight);
  for (const [, c] of clusters) {
    for (const line of c.lineObjects || []) {
      if (line.material && line.material.resolution) {
        line.material.resolution.set(window.innerWidth, window.innerHeight);
      }
    }
  }
}

function buildSky() {
  // 1. nebula gradient dome
  const domeGeo = new THREE.SphereGeometry(1200, 32, 32);
  const domeMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false, fog: false,
    uniforms: {},
    vertexShader: `
      varying vec3 vDir;
      void main() {
        vDir = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vDir;
      vec3 s2l(vec3 c){
        return pow((c + vec3(0.055)) / 1.055, vec3(2.4));
      }
      vec3 col(float t){
        vec3 bottom = s2l(vec3(0.039,0.055,0.118)); // #0A0E1E
        vec3 mid    = s2l(vec3(0.020,0.027,0.051)); // #05070D
        vec3 top    = s2l(vec3(0.043,0.039,0.094)); // #0B0A18
        if(t < 0.5) return mix(bottom, mid, t*2.0);
        return mix(mid, top, (t-0.5)*2.0);
      }
      void main(){
        float t = clamp(vDir.y*0.5+0.5, 0.0, 1.0);
        vec3 c = col(t);
        // two faint radial blooms
        float vio = max(0.0, dot(vDir, normalize(vec3(0.3,0.9,0.2))));
        c += s2l(vec3(0.102,0.078,0.251)) * pow(vio,4.0) * 0.06; // violet #1A1440
        float teal = max(0.0, dot(vDir, normalize(vec3(-0.3,-0.9,-0.2))));
        c += s2l(vec3(0.055,0.165,0.200)) * pow(teal,4.0) * 0.04; // teal #0E2A33
        gl_FragColor = vec4(c, 1.0);
      }`
  });
  const dome = new THREE.Mesh(domeGeo, domeMat);
  dome.raycast = () => {};
  scene.add(dome);

  // 3. background starfield
  const N = 2600;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const siz = new Float32Array(N);
  const rndBg = mulberry32(0xBADCAFE);
  for (let i = 0; i < N; i++) {
    // uniform on shell radius 700..1000
    let x = rndBg() * 2 - 1, y = rndBg() * 2 - 1, z = rndBg() * 2 - 1;
    const l = Math.hypot(x, y, z) || 1; x /= l; y /= l; z /= l;
    const r = 700 + rndBg() * 300;
    pos[i * 3] = x * r; pos[i * 3 + 1] = y * r; pos[i * 3 + 2] = z * r;
    // white with slight warm/blue tint
    const tint = rndBg();
    const warm = tint > 0.5;
    col[i * 3] = warm ? 1.0 : 0.92;
    col[i * 3 + 1] = 0.95 + rndBg() * 0.05;
    col[i * 3 + 2] = warm ? 0.92 : 1.0;
    siz[i] = 0.6 + rndBg() * 1.2;
  }
  const bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  bgGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  bgGeo.setAttribute('size', new THREE.BufferAttribute(siz, 1));
  const bgMat = new THREE.PointsMaterial({
    size: 1.4, vertexColors: true, transparent: true, opacity: 0.7,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false,
    map: haloTex, fog: false
  });
  bgStars = new THREE.Points(bgGeo, bgMat);
  bgStars.raycast = () => {};
  scene.add(bgStars);
}

function buildConstellations() {
  const clusterMap = layoutClusters(DATA.models);

  for (const model of DATA.models) {
    const modelIndex = MODEL_ORDER.indexOf(model.id);
    const introDelay = Math.max(0, modelIndex) * 0.1;
    const center = clusterMap.get(model.id).center;
    const placed = layoutTopics(model, center);
    const color = new THREE.Color(model.color);

    const group = new THREE.Group();
    scene.add(group);

    const starMat = () => new THREE.SpriteMaterial({
      map: starTex, color: color.clone(), blending: THREE.AdditiveBlending,
      depthWrite: false, transparent: true, fog: false
    });
    const haloMatProto = new THREE.SpriteMaterial({
      map: haloTex, color: color.clone(), blending: THREE.AdditiveBlending,
      depthWrite: false, transparent: true, fog: false
    });

    const starEntries = [];
    for (const p of placed) {
      const { topic, pos, scale } = p;
      const phase = (fnv1a(topic.id) % 10000) / 10000 * Math.PI * 2;

      // halo (behind)
      const halo = new THREE.Sprite(haloMatProto.clone());
      const haloBase = (0.22 + 0.5 * topic.heat) * 0.6;
      halo.position.copy(pos);
      halo.scale.setScalar(scale * 0.2);
      halo.material.opacity = 0;
      halo.renderOrder = 1;
      halo.raycast = () => {};
      group.add(halo);

      // star sprite
      const sprite = new THREE.Sprite(starMat());
      sprite.position.copy(pos);
      sprite.scale.setScalar(scale * 0.2);
      sprite.material.opacity = 0;
      sprite.renderOrder = 2;
      const entry = { sprite, halo, topic, model, baseScale: scale, phase, haloBase, hoverBoost: 1, hoverTarget: 1, introDelay };
      sprite.userData = entry;
      halo.userData.haloBase = haloBase;
      group.add(sprite);

      interactive.push(sprite);
      allStars.push(entry);
      starEntries.push({ ...entry, pos });
    }

    // MST lines
    const pts = starEntries.map(e => e.pos);
    const edges = computeMST(pts);
    const linePos = [];
    for (const [i, j] of edges) {
      const a = starEntries[i], b = starEntries[j];
      const dirAB = b.pos.clone().sub(a.pos).normalize();
      const a2 = a.pos.clone().add(dirAB.clone().multiplyScalar(a.baseScale * 0.55));
      const b2 = b.pos.clone().add(dirAB.clone().multiplyScalar(-b.baseScale * 0.55));
      linePos.push(a2.x, a2.y, a2.z, b2.x, b2.y, b2.z);
    }
    const lineGeo = new LineGeometry();
    lineGeo.setPositions(linePos);
    const lineMat = new LineMaterial({
      color: color.getHex(), transparent: true, opacity: 0,
      linewidth: 1.6, blending: THREE.AdditiveBlending, depthWrite: false,
      resolution: new THREE.Vector2(window.innerWidth, window.innerHeight)
    });
    const lines = new Line2(lineGeo, lineMat);
    lines.computeLineDistances();
    lines.renderOrder = 0;
    group.add(lines);

    const glowGeo = new LineGeometry();
    glowGeo.setPositions(linePos);
    const glowMat = new LineMaterial({
      color: color.getHex(), transparent: true, opacity: 0,
      linewidth: 4.4, blending: THREE.AdditiveBlending, depthWrite: false,
      resolution: new THREE.Vector2(window.innerWidth, window.innerHeight)
    });
    const lineGlow = new Line2(glowGeo, glowMat);
    lineGlow.computeLineDistances();
    lineGlow.renderOrder = -1;
    group.add(lineGlow);

    // cluster label
    let clusterRadius = 0;
    let labelY = -Infinity;
    for (const e of starEntries) {
      clusterRadius = Math.max(clusterRadius, center.distanceTo(e.pos) + e.baseScale);
      labelY = Math.max(labelY, e.pos.y + e.baseScale);
    }
    const labelTex = createLabelTexture(model.name, model.vendor, model.color);
    const labelMat = new THREE.SpriteMaterial({ map: labelTex, depthWrite: false, transparent: true, fog: false, opacity: 0 });
    const label = new THREE.Sprite(labelMat);
    label.position.set(center.x, labelY + 10, center.z);
    label.scale.set(48, 12, 1);
    label.userData = { isLabel: true, modelId: model.id };
    label.renderOrder = 3;
    group.add(label);
    interactive.push(label);

    clusters.set(model.id, { center, group, lines, lineGlow, lineObjects: [lines, lineGlow], label, model, clusterRadius, color, introDelay });
  }

  // selection ring (single, reused)
  const ringMat = new THREE.SpriteMaterial({
    map: ringTex, color: 0xffffff, blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0, fog: false
  });
  selectionRing = new THREE.Sprite(ringMat);
  selectionRing.renderOrder = 4;
  selectionRing.raycast = () => {};
  selectionRing.visible = false;
  scene.add(selectionRing);
}

// ============================================================
// interaction
// ============================================================
let downPos = null;

function setPointerFromEvent(e) {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function pickStar() {
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(interactive, false);
  return hits.length ? hits[0].object : null;
}

function clearHoverTip() {
  if (hovered && hovered !== selected) hovered.hoverTarget = 1;
  hovered = null;
  tipEl.classList.remove('show');
  canvas.style.cursor = 'default';
}

let lastClientX = 0, lastClientY = 0, moveQueued = false;
function onPointerMove(e) {
  lastClientX = e.clientX; lastClientY = e.clientY;
  if (moveQueued) return;
  moveQueued = true;
  requestAnimationFrame(() => {
    moveQueued = false;
    setPointerFromEvent({ clientX: lastClientX, clientY: lastClientY });
    const obj = pickStar();
    if (obj && obj.userData && obj.userData.topic) {
      if (hovered !== obj.userData) {
        if (hovered && hovered !== (selected)) hovered.hoverTarget = 1;
        hovered = obj.userData;
      }
      hovered.hoverTarget = (hovered === selected) ? 1.6 : 1.45;
      canvas.style.cursor = 'pointer';
      tipEl.textContent = hovered.topic.label;
      tipEl.style.left = (lastClientX + 14) + 'px';
      tipEl.style.top = (lastClientY + 14) + 'px';
      tipEl.classList.add('show');
    } else {
      const labelHit = !!(obj && obj.userData && obj.userData.isLabel);
      if (obj && obj.userData && obj.userData.isLabel) {
        canvas.style.cursor = 'pointer';
      } else {
        canvas.style.cursor = 'default';
      }
      if (hovered && hovered !== selected) hovered.hoverTarget = 1;
      hovered = null;
      tipEl.classList.remove('show');
      if (labelHit) canvas.style.cursor = 'pointer';
    }
  });
}

function onPointerDown(e) {
  downPos = { x: e.clientX, y: e.clientY };
  controls.autoRotate = false;
  lastInteraction = clock.getElapsedTime();
  hintEl.classList.add('gone');
}

function onPointerUp(e) {
  if (!downPos) return;
  const dx = e.clientX - downPos.x, dy = e.clientY - downPos.y;
  const moved = Math.hypot(dx, dy);
  downPos = null;
  if (moved >= 5) return;                 // was a drag
  setPointerFromEvent(e);
  const obj = pickStar();
  if (obj && obj.userData && obj.userData.topic) {
    selectStar(obj.userData);
  } else if (obj && obj.userData && obj.userData.isLabel) {
    focusCluster(obj.userData.modelId);
  } else {
    deselect();
  }
}

let lastClickTime = 0;
function onDblEmpty(e) {
  setPointerFromEvent(e);
  const obj = pickStar();
  if (!obj) resetCamera();
}

function onWheel() {
  controls.autoRotate = false;
  lastInteraction = clock.getElapsedTime();
  hintEl.classList.add('gone');
}

function selectStar(entry) {
  clearHoverTip();
  selected = entry;
  entry.hoverTarget = 1.6;
  // ring
  selectionRing.visible = true;
  selectionRing.material.color.copy(entry.sprite.material.color);
  selectionRing.material.opacity = 0.8;
  selectionRing.position.copy(entry.sprite.position);
  selectionRing.scale.setScalar(entry.baseScale * 1.9);

  // camera fly: mobile keeps the selected star in the uncovered upper viewport.
  const mobile = window.innerWidth <= 640;
  const starPos = entry.sprite.position.clone();
  const dir = camera.position.clone().sub(starPos).normalize();
  const camTo = starPos.clone().add(dir.multiplyScalar(mobile ? 145 : 90));
  camTo.y += mobile ? 24 : 12;
  const targetTo = starPos.clone();
  if (mobile) targetTo.y -= 42;
  tweenCamera(camTo, targetTo, 900);

  renderPanel(entry.topic, entry.model);
  openPanel();
  focusClusterLines(entry.model.id);
}

function deselect() {
  if (selected) selected.hoverTarget = 1;
  selected = null;
  selectionRing.visible = false;
  selectionRing.material.opacity = 0;
  closePanel();
  restoreClusterLines();
  lastInteraction = clock.getElapsedTime();
}

function focusCluster(modelId) {
  clearHoverTip();
  if (selected && selected.model.id !== modelId) deselect();
  const c = clusters.get(modelId);
  if (!c) return;
  const center = c.center.clone();
  const dir = camera.position.clone().sub(center).normalize();
  const camTo = center.clone().add(dir.multiplyScalar(170));
  tweenCamera(camTo, center, 900);
  focusClusterLines(modelId);
  lastInteraction = clock.getElapsedTime();
}

function focusClusterLines(modelId) {
  for (const [id, c] of clusters) {
    c._lineTarget = (id === modelId) ? 0.5 : 0.12;
  }
}
function restoreClusterLines() {
  for (const [, c] of clusters) c._lineTarget = 0.28;
}

function resetCamera() {
  tweenCamera(defaultCameraPosition(), new THREE.Vector3(0, 0, 0), 1100);
  restoreClusterLines();
  lastInteraction = clock.getElapsedTime();
}

function tweenCamera(toPos, toTarget, ms = 900) {
  camTween = {
    fromPos: camera.position.clone(),
    toPos: toPos.clone(),
    fromTarget: controls.target.clone(),
    toTarget: toTarget.clone(),
    start: clock.getElapsedTime(),
    ms
  };
  controls.enabled = false;
}

function updateCameraTween(tNow) {
  if (!camTween) return;
  const t = clamp((tNow - camTween.start) / (camTween.ms / 1000), 0, 1);
  const e = easeInOutCubic(t);
  lerpV3(camTween.fromPos, camTween.toPos, e, camera.position);
  lerpV3(camTween.fromTarget, camTween.toTarget, e, controls.target);
  if (t >= 1) { camTween = null; controls.enabled = true; }
}

// ---- panel DOM ----
function openPanel() { panelEl.classList.add('open'); panelOpen = true; }
function closePanel() { panelEl.classList.remove('open'); panelOpen = false; }

function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function renderPanel(topic, model) {
  panelEl.querySelector('.modelchip .dot').style.background = model.color;
  panelEl.querySelector('.modelchip .dot').style.boxShadow = `0 0 8px ${model.color}`;
  panelEl.querySelector('.modelchip .mtxt').textContent = `${model.vendor} · ${model.name}`;
  panelEl.querySelector('.modelchip .mtxt').style.color = model.color;
  panelEl.querySelector('.ptopic').textContent = topic.label;
  panelEl.querySelector('.mentions').innerHTML = `&#9650; ${fmt(topic.volume)} mentions`;
  const fill = panelEl.querySelector('.heatfill');
  fill.style.background = `linear-gradient(90deg, ${model.color}, #ffffff)`;
  fill.style.width = '0%';
  requestAnimationFrame(() => { fill.style.width = Math.round(topic.heat * 100) + '%'; });
  panelEl.querySelector('.psummary').textContent = topic.summary;

  const wrap = panelEl.querySelector('.posts');
  wrap.innerHTML = '';
  wrap.scrollTop = 0;
  (topic.posts || []).forEach((post, i) => {
    const a = document.createElement('a');
    a.className = 'post';
    a.href = post.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML =
      `<div class="author" style="color:${model.color}">${esc(post.author)}</div>` +
      `<div class="ptext">${esc(post.text)}</div>` +
      `<div class="pfoot">&#9829; ${fmtK(post.likes)} &nbsp;·&nbsp; &#8646; ${fmtK(post.reposts)}</div>`;
    a.style.opacity = '0';
    a.style.transform = 'translateY(8px)';
    a.style.transition = 'opacity 280ms ease, transform 280ms ease, background 160ms ease';
    wrap.appendChild(a);
    setTimeout(() => { a.style.opacity = '1'; a.style.transform = 'translateY(0)'; }, 40 * i + 60);
  });
}

// ---- legend ----
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  document.getElementById('gendate').textContent = formatDate(DATA.generatedAt);
  // legend follows model order for a stable reading order
  const byId = new Map(DATA.models.map(m => [m.id, m]));
  MODEL_ORDER.forEach(id => {
    const m = byId.get(id);
    if (!m) return;
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.model = id;
    chip.innerHTML = `<span class="dot" style="background:${m.color};box-shadow:0 0 8px ${m.color}"></span><span class="nm">${esc(m.name)}</span>`;
    chip.addEventListener('click', () => focusCluster(id));
    chip.addEventListener('dblclick', (ev) => { ev.preventDefault(); toggleDim(id); });
    el.appendChild(chip);
  });
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) { return iso; }
}

function toggleDim(modelId) {
  dimmedModel = (dimmedModel === modelId) ? null : modelId;
  applyDim();
}
function applyDim() {
  for (const [id, c] of clusters) {
    const dim = (dimmedModel && id !== dimmedModel);
    const o = dim ? 0.15 : 1;
    c.group.traverse(obj => {
      if ((c.lineObjects || []).includes(obj)) return;      // lines handled via _lineTarget path
      if (obj.material && 'opacity' in obj.material) {
        obj.userData._dimMul = o;
      }
    });
    c._dimMul = o;
  }
  // legend chip styling
  document.querySelectorAll('.chip').forEach(ch => {
    const id = ch.dataset.model;
    ch.classList.toggle('dimmed', !!(dimmedModel && id !== dimmedModel));
  });
}

// ============================================================
// per-frame updates
// ============================================================
function introAmount(t, delay, span = 0.72) {
  return easeInOutCubic(clamp((t - delay) / span, 0, 1));
}

function updatePulses(t) {
  for (const e of allStars) {
    const heat = e.topic.heat;
    const pulse = 1 + heat * 0.12 * Math.sin(t * (0.8 + heat * 1.6) + e.phase);
    const dimMul = (dimmedModel && e.model.id !== dimmedModel) ? 0.15 : 1;
    const intro = introAmount(t, e.introDelay);
    const introScale = 0.2 + intro * 0.8;
    const s = e.baseScale * introScale * e.hoverBoost * pulse;
    e.sprite.scale.setScalar(s);
    e.sprite.material.opacity = dimMul * intro;
    // halo
    const flick = 0.9 + 0.1 * Math.sin(t * 2.3 + e.phase);
    const hoverHaloMul = 1 + (e.hoverBoost - 1) * 1.1;
    e.halo.material.opacity = e.haloBase * flick * hoverHaloMul * dimMul * intro;
    e.halo.scale.setScalar(s * 2.6);
    e.halo.position.copy(e.sprite.position);
  }
}

function updateHover() {
  for (const e of allStars) {
    e.hoverBoost += (e.hoverTarget - e.hoverBoost) * 0.12;
  }
}

function updateLabelOpacity(t) {
  for (const [id, c] of clusters) {
    const mobile = window.innerWidth <= 640;
    const intro = introAmount(t, c.introDelay + 0.25);
    const d = camera.position.distanceTo(c.label.position);
    let o = clamp(mapLinear(d, 150, 600, 0.55, 1.0), 0.55, 1.0);
    if (dimmedModel && id !== dimmedModel) o *= 0.15;
    c.label.material.opacity = mobile ? 0 : o * intro;
    // line opacity tween toward target
    const target = (c._lineTarget != null) ? c._lineTarget : 0.28;
    let lo = c._lineOpacity == null ? 0 : c._lineOpacity;
    lo += (target - lo) * 0.08;
    c._lineOpacity = lo;
    let visibleLineOpacity = lo * introAmount(t, c.introDelay + 0.48, 0.9);
    if (dimmedModel && id !== dimmedModel) lo = Math.min(lo, 0.12 * 0.15 + 0.02);
    if (dimmedModel && id !== dimmedModel) visibleLineOpacity = Math.min(visibleLineOpacity, 0.12 * 0.15 + 0.02);
    c.lines.material.opacity = visibleLineOpacity;
    c.lineGlow.material.opacity = visibleLineOpacity * 0.26;
  }
}

function updateBackground(t, dt) {
  if (!bgStars) return;
  bgStars.rotation.y += dt * 0.002;
  bgStars.rotation.x += dt * 0.0007;
  bgStars.material.opacity = 0.64 + Math.sin(t * 0.7) * 0.035 + Math.sin(t * 1.37 + 1.8) * 0.018;
}

function updateIdleAutorotate(t) {
  if (!panelOpen && !camTween && (t - lastInteraction) > 7) {
    if (!controls.autoRotate) { controls.autoRotate = true; curAutoRotateSpeed = 0; }
    curAutoRotateSpeed += (TARGET_AUTOROTATE - curAutoRotateSpeed) * 0.02;
    controls.autoRotateSpeed = curAutoRotateSpeed;
  }
}

function spinSelectionRing(t) {
  if (selectionRing.visible && selected) {
    selectionRing.position.copy(selected.sprite.position);
    selectionRing.scale.setScalar(selected.baseScale * selected.hoverBoost * 1.9);
    selectionRing.material.rotation = t * 0.3;
  }
}

// ============================================================
// loop
// ============================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;
  updateCameraTween(t);
  controls.update();
  updateBackground(t, dt);
  updatePulses(t);
  updateHover();
  updateLabelOpacity(t);
  updateIdleAutorotate(t);
  spinSelectionRing(t);
  composer.render();
}

// ============================================================
// boot
// ============================================================
function init() {
  computeVolumeRange();
  initRenderer();
  buildSky();
  buildConstellations();
  renderLegend();

  // events
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', clearHoverTip);
  canvas.addEventListener('wheel', onWheel, { passive: true });
  canvas.addEventListener('dblclick', onDblEmpty);
  document.getElementById('panelClose').addEventListener('click', deselect);
  window.addEventListener('keydown', (e) => { if (e.key === 'Escape') deselect(); });

  animate();
}

init();
</script>
</body>
